<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="outer-container">
      <nav class="navbar">
        <div class="title-name">Convertly</div>
        <div class="themeToggleButton">
          <div class="darkThemeButton"><i class="fa-regular fa-moon"></i></div>
          <div class="lightThemeButton"><i class="fa-solid fa-sun"></i></div>
        </div>
      </nav>
      <div class="inner-container">
        <div class="AmountInputContainer">
          <div class="innerContainerTitles">Amount</div>
          <input type="number" class="AmountInputBox" />
        </div>
      </div>
    </div>
  </body>
</html>
