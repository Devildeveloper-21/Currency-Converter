<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="outer-container">
      <nav class="navbar">
        <div class="title-name" onclick="location.reload()">Convertly</div>
        <div class="themeToggleButton">
          <div class="darkThemeButton" id="darkThemeButton">
            <i class="fa-regular fa-moon"></i>
          </div>
          <div class="lightThemeButton" id="lightThemeButton">
            <i class="fa-solid fa-sun"></i>
          </div>
        </div>
      </nav>
      <div class="inner-container">
        <div class="AmountInputContainer">
          <div class="innerContainerTitles">Amount</div>
          <input type="number" class="AmountInputBox" id="currencyInput" />
        </div>
        <div class="convertFromToContainer">
          <div class="convertFromContainer">
            <div class="fromTitle innerContainerTitles">From</div>
            <select name="currency" id="fromCurrency">
              <option value="USD">USD - US Dollar</option>
              <option value="INR">INR - Indian Rupee</option>
              <option value="AED">AED - UAE Dirham</option>
              <option value="EUR">EUR - Euro</option>
              <option value="GBP">GBP - British Pound</option>
              <option value="JPY">JPY - Japanese Yen</option>
              <option value="AUD">AUD - Australian Dollar</option>
              <option value="CAD">CAD - Canadian Dollar</option>
              <option value="SGD">SGD - Singapore Dollar</option>
              <option value="CNY">CNY - Chinese Yuan</option>
              <option value="CHF">CHF - Swiss Franc</option>
              <option value="NZD">NZD - New Zealand Dollar</option>
              <option value="ZAR">ZAR - South African Rand</option>
              <option value="SAR">SAR - Saudi Riyal</option>
              <option value="QAR">QAR - Qatari Riyal</option>
              <option value="KWD">KWD - Kuwaiti Dinar</option>
              <option value="BHD">BHD - Bahraini Dinar</option>
              <option value="MYR">MYR - Malaysian Ringgit</option>
              <option value="THB">THB - Thai Baht</option>
              <option value="KRW">KRW - South Korean Won</option>
            </select>
          </div>
          <div class="convertToContainer">
            <div class="toTitle innerContainerTitles">To</div>
            <select name="currency" id="toCurrency">
              <option value="USD">USD - US Dollar</option>
              <option value="INR">INR - Indian Rupee</option>
              <option value="AED">AED - UAE Dirham</option>
              <option value="EUR">EUR - Euro</option>
              <option value="GBP">GBP - British Pound</option>
              <option value="JPY">JPY - Japanese Yen</option>
              <option value="AUD">AUD - Australian Dollar</option>
              <option value="CAD">CAD - Canadian Dollar</option>
              <option value="SGD">SGD - Singapore Dollar</option>
              <option value="CNY">CNY - Chinese Yuan</option>
              <option value="CHF">CHF - Swiss Franc</option>
              <option value="NZD">NZD - New Zealand Dollar</option>
              <option value="ZAR">ZAR - South African Rand</option>
              <option value="SAR">SAR - Saudi Riyal</option>
              <option value="QAR">QAR - Qatari Riyal</option>
              <option value="KWD">KWD - Kuwaiti Dinar</option>
              <option value="BHD">BHD - Bahraini Dinar</option>
              <option value="MYR">MYR - Malaysian Ringgit</option>
              <option value="THB">THB - Thai Baht</option>
              <option value="KRW">KRW - South Korean Won</option>
            </select>
          </div>
        </div>
        <div class="convertButtonField">
          <button class="convertButton" id="convertButton">Convert</button>
        </div>
        <div class="outputField" id="outputField"></div>
      </div>
    </div>
    <script src="script.js" type="module"></script>
  </body>
</html>
